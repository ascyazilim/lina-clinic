services:
  postgres:
    image: postgres:16
    container_name: lina-clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lina_clinic_db
      POSTGRES_USER: lina_user
      POSTGRES_PASSWORD: lina_password
    ports:
      - "5433:5432"
    volumes:
      - lina_clinic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lina_user -d lina_clinic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lina_clinic_postgres_data:
