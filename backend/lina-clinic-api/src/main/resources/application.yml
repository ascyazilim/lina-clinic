spring:
  application:
    name: lina-clinic-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5433}/${DB_NAME:lina_clinic_db}
    username: ${DB_USERNAME:lina_user}
    password: ${DB_PASSWORD:lina_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:lina-clinic-jwt-secret-key-change-this-in-production-2026-secure-default}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
